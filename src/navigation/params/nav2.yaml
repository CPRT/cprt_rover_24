local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: True
      use_maximum: False
      lethal_cost_threshold: 200
      trinary_costmap: False
      width: 5
      height: 5
      resolution: 0.2
      footprint: "[[0.56, 0.48], [0.56, -0.48], [-0.56, -0.48], [-0.56, 0.48]]"
      plugins: [obstacle_layer]
      obstacle_layer:
        plugin: "cprt_costmap_plugins::GridmapLayer"
        enabled: true
        map_topic: "/trasversability_map"
        layer_name: "traversability"
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      rolling_window: false
      height: 1000
      width: 1000
      origin_x: -500.0
      origin_y: -500.0
      use_sim_time: True
      footprint: "[[0.55, 0.45], [0.55, -0.45], [-0.55, -0.45], [-0.55, 0.45]]"
      resolution: 0.2
      track_unknown_space: true
      trinary_costmap: false
      lethal_cost_threshold: 200
      unknown_cost_value: 255 # 255 is special key for unknown value
      # plugins: [static_layer, inflation_layer, obstacle_layer]
      # plugins: [obstacle_layer]
      plugins: [blank_static_layer, inflation_layer, obstacle_layer]
      # plugins: [static_layer, inflation_layer]
      # static_layer:
      #   enabled: true
      #   plugin: nav2_costmap_2d::StaticLayer
      #   map_subscribe_transient_local: True
      #   subscribe_to_updates: True
      #   footprint_clearing_enabled: True
      #   map_topic: /map
      blank_static_layer:
        enabled: true
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: True
        subscribe_to_updates: True
        footprint_clearing_enabled: True
        map_topic: /blank_map
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.0
        inflation_radius: 1.0
      obstacle_layer:
        plugin: "cprt_costmap_plugins::GridmapLayer"
        enabled: true
        map_topic: "/trasversability_map"
        layer_name: "inflated_traversability"
      always_send_full_costmap: True

map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: turtlebot3_world.yaml

map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    use_sim_time: True


    GridBased:
      plugin: "cprt_planner_plugins::EventHorizonPlanner" # In Iron and older versions, "/" was used instead of "::"
      primary_planner: "nav2_smac_planner/SmacPlannerHybrid"

      # plugin: "nav2_smac_planner/SmacPlannerHybrid"

      interpolation_resolution: 0.1       
      horizon_distance: 20.0
      downsample_costmap: true            # whether or not to downsample the map
      downsampling_factor: 2              # multiplier for the resolution of the costmap layer (e.g. 2 on a 5cm costmap would be 10cm)
      tolerance: 0.5                      # dist-to-goal heuristic cost (distance) for valid tolerance endpoints if exact goal cannot be found.
      allow_unknown: true                 # allow traveling in unknown space
      goal_heading_mode: "DEFAULT"  # For “ALL_DIRECTION” mode, the planner will plan the goal with the orientation of the goal pose and all the possible orientation based on the angle quantization bins
      use_final_approach_orientation: false
      max_iterations: -1                  # maximum total iterations to search for before failing (in case unreachable), set to -1 to disable
      max_on_approach_iterations: 1000    # Maximum number of iterations after within tolerances to continue to try to find exact solution
      max_planning_time: 40.0             # max time in s for planner to plan, smooth
      motion_model_for_search: "DUBIN"    # Hybrid-A* Dubin, Redds-Shepp
      angle_quantization_bins: 72         # Number of angle bins for search
      analytic_expansion_ratio: 3.5       # The ratio to attempt analytic expansions during search for final approach.
      analytic_expansion_max_length: 3.0  # For Hybrid/Lattice nodes: The maximum length of the analytic expansion to be considered valid to prevent unsafe shortcutting
      analytic_expansion_max_cost: 200.0  # The maximum single cost for any part of an analytic expansion to contain and be valid, except when necessary on approach to goal
      analytic_expansion_max_cost_override: false  #  Whether or not to override the maximum cost setting if within critical distance to goal (ie probably required)
      minimum_turning_radius: 0.80        # minimum turning radius in m of path / vehicle
      reverse_penalty: 5.0                # Penalty to apply if motion is reversing, must be => 1
      change_penalty: 1.8                 # Penalty to apply if motion is changing directions (L to R), must be >= 0
      non_straight_penalty: 1.2           # Penalty to apply if motion is non-straight, must be => 1
      cost_penalty: 1.5                   # Penalty to apply to higher cost areas when adding into the obstacle map dynamic programming distance expansion heuristic. This drives the robot more towards the center of passages. A value between 1.3 - 3.5 is reasonable.
      retrospective_penalty: 0.015
      lookup_table_size: 60.0             # Size of the dubin/reeds-sheep distance window to cache, in meters.
      cache_obstacle_heuristic: true      # Cache the obstacle map dynamic programming distance expansion heuristic between subsequent replannings of the same goal location. Dramatically speeds up replanning performance (40x) if costmap is largely static.
      debug_visualizations: False         # For Hybrid nodes: Whether to publish expansions on the /expansions topic as an array of poses (the orientation has no meaning) and the path's footprints on the /planned_footprints topic. WARNING: heavy to compute and to display, for debug only as it degrades the performance.
      use_quadratic_cost_penalty: False
      downsample_obstacle_heuristic: True
      allow_primitive_interpolation: False
      smooth_path: True                   # If true, does a simple and quick smoothing post-processing to the path

    # TODO: Uncomment when using the GridBased 
    # GridBased:
    #   plugin: "nav2_smac_planner/SmacPlanner2D"
    #   tolerance: 0.8
    #   downsample_costmap: true
    #   downsampling_factor: 2
    #   allow_unknown: true
    #   max_iterations: 5000000
    #   max_on_approach_iterations: 2000
    #   max_planning_time: 15.0
    #   cost_travel_multiplier: 2.0
    #   use_final_approach_orientation: false
    #   smoother:
    #     max_iterations: 1000 
    #     w_smooth: 0.3
    #     w_data: 0.2
    #     tolerance: 1.0e-10
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2


    # plugin: 'nav2_navfn_planner::NavfnPlanner'
    # use_astar: True
    # allow_unknown: True
    # use_final_approach_orientation: True
    # tolerance: 1.0

smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: [simple_smoother]
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 0.4
    behavior_plugins: [spin, backup, drive_on_heading, wait]
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
    wait:
      plugin: nav2_behaviors/Wait
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.02
    rotational_acc_lim: 0.02

robot_state_publisher:
  ros__parameters:
    use_sim_time: True

waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: OPEN_LOOP
    max_velocity: [1.0, 0.0, 2.0]
    min_velocity: [-1.0, 0.0, -2.0]
    max_accel: [0.1, 0.0, 1.0]
    max_decel: [-0.1, 0.0, -1.0]
    odom_topic: odometry/filtered/local
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
