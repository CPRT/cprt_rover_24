controller_server:
  ros__parameters:
    use_sim_time: True
    odom_topic: odometry/filtered/local
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.1
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.1
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: True
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 1.1
      yaw_goal_tolerance: 5.0

    FollowPath:
      plugin: nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController

      # TODO: Remove this when we decide to use the new RotationShimController or not
      # Shim controller settings
      # plugin: "nav2_rotation_shim_controller::RotationShimController"
      # primary_controller: nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController
      # angular_dist_threshold: 1.2
      # forward_sampling_distance: 0.5
      # rotate_on_heading_angular_vel: 1.4
      # rotate_to_goal_heading: false
      # rotate_to_heading_once: false
      # closed_loop: false

      transform_tolerance: 1.0

      desired_linear_vel: 0.5
      max_robot_pose_search_dist: 10.0

      lookahead_dist: 1.0
      min_lookahead_dist: 0.3
      max_lookahead_dist: 1.0
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: false

      min_approach_linear_velocity: 0.1
      max_allowed_time_to_collision_up_to_carrot: 5.0

      use_regulated_linear_velocity_scaling: false
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25

      use_rotate_to_heading: false
      # rotate_to_heading_min_angle: 0.8
      # rotate_to_heading_angular_vel: 1.0
      max_angular_accel: 0.5

      use_interpolation: false
      cost_scaling_dist: 0.5
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 10.0

      allow_reversing: false

